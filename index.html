<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lazak</title>
    <script>
      // Prevent libraries from trying to overwrite window.fetch, which is read-only in this environment
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: false,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked attempt to overwrite window.fetch'); }
            });
          }
        } catch (e) {
          // If it's already non-configurable, this might throw, which is fine
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
